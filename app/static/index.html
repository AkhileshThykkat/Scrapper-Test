<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Intelligence Dashboard</title>
    <!-- HTMX for dynamic interactions -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 glass-panel">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-brand-600 text-white p-2 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-900 to-brand-600">Review Intelligence</h1>
            </div>
            <nav class="flex gap-4">
                <a href="#" class="text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors">Dashboard</a>
                <a href="#" class="text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors">Companies</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Column: Add Company Form -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <h2 class="text-lg font-semibold text-slate-900 mb-1">Track New Company</h2>
                    <p class="text-sm text-slate-500 mb-6">Add a competitor to extract insights from their reviews.</p>
                    
                    <form hx-post="/api/v1/companies/ui-create" hx-target="#companies-list" hx-swap="afterbegin" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Company Name</label>
                            <input type="text" name="name" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="e.g. Acme Corp">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Website URL <span class="text-slate-400 font-normal">(Optional)</span></label>
                            <input type="url" name="website" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="https://example.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Google Maps URL</label>
                            <input type="url" name="google_maps_url" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="https://maps.google.com/...">
                        </div>
                        <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors flex justify-center items-center gap-2">
                            Add Company
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Column: Companies List & Actions -->
            <div class="lg:col-span-2 space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold text-slate-900">Monitored Companies</h2>
                    <button hx-get="/api/v1/companies/ui-list" hx-target="#companies-list" class="text-sm text-brand-600 hover:text-brand-700 font-medium flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Refresh List
                    </button>
                </div>

                <!-- HTMX Container for companies -->
                <div id="companies-list" class="space-y-4" hx-get="/api/v1/companies/ui-list" hx-trigger="load">
                    <!-- Loading State -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center">
                        <div class="loader mx-auto mb-4"></div>
                        <p class="text-slate-500">Loading companies...</p>
                    </div>
                </div>
                
                <!-- Detail View Container (populated via HTMX) -->
                <div id="company-detail-modal" class="hidden"></div>
            </div>

        </div>
    </main>

    <!-- Generic Modal overlay -->
    <div id="modal-backdrop" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>

    <script>
        // Simple script to handle modal closing
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            if (evt.detail.target.id === 'company-detail-modal') {
                const modal = document.getElementById('company-detail-modal');
                const backdrop = document.getElementById('modal-backdrop');
                if (modal.innerHTML.trim() !== '') {
                    modal.classList.remove('hidden');
                    backdrop.classList.remove('hidden');
                    setTimeout(() => backdrop.classList.add('opacity-100'), 10);
                }
            }
        });

        function closeModal() {
            const modal = document.getElementById('company-detail-modal');
            const backdrop = document.getElementById('modal-backdrop');
            backdrop.classList.remove('opacity-100');
            setTimeout(() => {
                backdrop.classList.add('hidden');
                modal.classList.add('hidden');
                modal.innerHTML = '';
            }, 300);
        }
    </script>
</body>
</html>
